<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>属性管理（变量映射）Demo</title>
  <script src="./tailwind-cdn.js"></script>
  <script src="https://unpkg.com/react@19/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="./index.css" />
  <style>
    body { background: #f0f2f5; color: rgba(0,0,0,0.88); font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; }
    .expand-section { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
    .expand-section.open { grid-template-rows: 1fr; }
    .expand-inner { overflow: hidden; }
    .confirm-popover {
      position: absolute; right: 0; top: 100%; z-index: 10; margin-top: 4px;
      background: white; border-radius: 8px; padding: 12px 16px; white-space: nowrap;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08), 0 3px 6px -4px rgba(0,0,0,0.12), 0 9px 28px 8px rgba(0,0,0,0.05);
    }
    /* 数据流动画 */
    .flow-arrow { animation: flowPulse 2s ease-in-out infinite; }
    @keyframes flowPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    /* 编辑行高亮 */
    .editing-row { background: #fffbe6 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    /* ================================================================
     *  常量 & Mock 数据
     * ================================================================ */
    const FIELD_TYPES = [
      { value: 'STRING', label: '字符串 STRING' },
      { value: 'INTEGER', label: '整数 INTEGER' },
      { value: 'LONG', label: '长整数 LONG' },
      { value: 'DOUBLE', label: '浮点数 DOUBLE' },
      { value: 'BOOLEAN', label: '布尔 BOOLEAN' },
      { value: 'LIST', label: '列表 LIST' },
      { value: 'JSON', label: 'JSON 对象' },
    ];

    const VALIDATE_TYPES = [
      { value: '', label: '不校验' },
      { value: 'STRING', label: '字符串' },
      { value: 'INTEGER', label: '整数' },
      { value: 'LONG', label: '长整数' },
      { value: 'DOUBLE', label: '数字' },
      { value: 'BOOLEAN', label: '布尔' },
      { value: 'LENGTH', label: '长度校验' },
      { value: 'MOBILE', label: '手机号' },
      { value: 'EMAIL', label: '邮箱' },
      { value: 'IP', label: 'IP 地址' },
      { value: 'REGEX', label: '正则表达式' },
    ];

    const MOCK_PROPERTIES_EP5 = [
      { id: '1', name: 'user_id', description: '用户ID', fieldName: 'properties.fromUserId', fieldType: 'STRING', validateType: 'STRING', validateArgs: '', status: 1 },
      { id: '2', name: 'trade_amount', description: '交易金额', fieldName: 'properties.amount', fieldType: 'DOUBLE', validateType: 'DOUBLE', validateArgs: '', status: 1 },
      { id: '3', name: 'target_address', description: '提现目标地址', fieldName: 'properties.toAddress', fieldType: 'STRING', validateType: 'LENGTH', validateArgs: '42', status: 1 },
      { id: '4', name: 'asset_type', description: '币种', fieldName: 'properties.assetType', fieldType: 'STRING', validateType: 'STRING', validateArgs: '', status: 1 },
      { id: '5', name: 'client_ip', description: '客户端IP', fieldName: 'eventInfo.clientIp', fieldType: 'STRING', validateType: 'IP', validateArgs: '', status: 1 },
      { id: '6', name: 'request_id', description: '请求唯一标识', fieldName: 'eventInfo.requestId', fieldType: 'STRING', validateType: '', validateArgs: '', status: 1 },
    ];

    const MOCK_PROPERTIES_EP_LOGIN = [
      { id: '10', name: 'user_id', description: '用户ID', fieldName: 'properties.userId', fieldType: 'STRING', validateType: 'STRING', validateArgs: '', status: 1 },
      { id: '11', name: 'device_id', description: '设备ID', fieldName: 'properties.deviceId', fieldType: 'STRING', validateType: 'STRING', validateArgs: '', status: 1 },
      { id: '12', name: 'client_ip', description: '客户端IP', fieldName: 'properties.clientIp', fieldType: 'STRING', validateType: 'IP', validateArgs: '', status: 1 },
      { id: '13', name: 'platform', description: '登录平台', fieldName: 'properties.platform', fieldType: 'STRING', validateType: 'STRING', validateArgs: '', status: 1 },
      { id: '14', name: 'login_tx_id', description: '登录事务ID', fieldName: 'properties.loginTransactionId', fieldType: 'STRING', validateType: '', validateArgs: '', status: 1 },
      { id: '15', name: 'sms_verified', description: '短信验证状态', fieldName: 'properties.smsVerified', fieldType: 'BOOLEAN', validateType: 'BOOLEAN', validateArgs: '', status: 1 },
      { id: '16', name: 'email_verified', description: '邮箱验证状态', fieldName: 'properties.emailVerified', fieldType: 'BOOLEAN', validateType: 'BOOLEAN', validateArgs: '', status: 1 },
    ];

    // 示例原始 JSON 报文
    const SAMPLE_PAYLOAD_WITHDRAW = {
      eventPoint: "EP00000005",
      properties: {
        fromUserId: "8877678767",
        amount: 1000.0,
        toAddress: "eb1efgh0987654321efabcd0987654321",
        assetType: "USDT",
        chain: "ETH"
      },
      eventInfo: {
        requestId: "req-abc-123",
        clientIp: "203.0.113.42",
        clientTimestamp: "2026-04-09T10:00:00Z"
      }
    };

    const SAMPLE_PAYLOAD_LOGIN = {
      eventPoint: "EP00010001",
      scene: "PROCESS",
      properties: {
        userId: "8877678767",
        deviceId: "d-xxxx-yyyy",
        clientIp: "203.0.113.42",
        platform: "APP",
        loginTransactionId: "lt-uuid-001",
        smsVerified: false,
        emailVerified: false
      },
      eventInfo: {
        requestId: "req-def-456",
        clientTimestamp: "2026-04-09T10:00:35Z"
      }
    };

    /* ================================================================
     *  通用子组件
     * ================================================================ */
    function FieldTypeTag({ type }) {
      const colorMap = {
        STRING: { color: '#1890ff', bg: '#e6f7ff' },
        INTEGER: { color: '#722ed1', bg: '#f9f0ff' },
        LONG: { color: '#722ed1', bg: '#f9f0ff' },
        DOUBLE: { color: '#fa8c16', bg: '#fff7e6' },
        BOOLEAN: { color: '#52c41a', bg: '#f6ffed' },
        LIST: { color: '#13c2c2', bg: '#e6fffb' },
        JSON: { color: '#eb2f96', bg: '#fff0f6' },
      };
      const c = colorMap[type] || colorMap.STRING;
      return (
        <span className="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-mono whitespace-nowrap flex-shrink-0"
          style={{ color: c.color, background: c.bg, border: `1px solid ${c.color}25` }}>
          {type}
        </span>
      );
    }

    function ValidateTag({ type, args }) {
      if (!type) return <span className="text-[rgba(0,0,0,0.25)]">-</span>;
      const label = VALIDATE_TYPES.find(v => v.value === type)?.label || type;
      return (
        <span className="inline-flex items-center gap-1 text-xs text-[rgba(0,0,0,0.65)]">
          <span className="px-1.5 py-0.5 rounded bg-[#f5f5f5]">{label}</span>
          {args && <code className="text-[#722ed1] bg-[#f9f0ff] px-1 py-0.5 rounded">{args}</code>}
        </span>
      );
    }

    function StatusToggle({ enabled, onChange }) {
      return (
        <button
          className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors ${enabled ? 'bg-[#1890ff]' : 'bg-[rgba(0,0,0,0.25)]'}`}
          onClick={() => onChange(!enabled)}
        >
          <span className={`inline-block h-3.5 w-3.5 rounded-full bg-white shadow transition-transform ${enabled ? 'translate-x-[18px]' : 'translate-x-[3px]'}`} />
        </button>
      );
    }

    function SearchSelect({ value, onChange, options, placeholder, renderOption, disabled }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');
      const ref = useRef(null);
      useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);
      const filtered = options.filter(o => {
        const label = renderOption ? renderOption(o) : o.label || o.name || '';
        return label.toLowerCase().includes(search.toLowerCase());
      });
      const selected = options.find(o => (o.value || o.id || o.name) === value);
      const displayText = selected ? (renderOption ? renderOption(selected) : selected.label || selected.name || '') : '';
      return (
        <div className="relative" ref={ref}>
          <div className={`flex items-center border rounded-md px-3 h-8 bg-white transition-colors ${disabled ? 'bg-[#f5f5f5] cursor-not-allowed border-[#d9d9d9]' : 'cursor-pointer border-[#d9d9d9] hover:border-[#1890ff]'}`}
            onClick={() => !disabled && setOpen(!open)}>
            <span className={`flex-1 text-sm truncate ${displayText ? 'text-[rgba(0,0,0,0.88)]' : 'text-[rgba(0,0,0,0.25)]'}`}>{displayText || placeholder}</span>
            <svg className="w-3 h-3 ml-1 text-[rgba(0,0,0,0.25)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
          </div>
          {open && (
            <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg shadow-lg border border-[#f0f0f0] z-20 py-1 max-h-60 overflow-auto">
              <div className="px-2 py-1.5">
                <input type="text" className="w-full border border-[#d9d9d9] rounded px-2 h-7 text-sm outline-none focus:border-[#1890ff]"
                  placeholder="搜索..." value={search} onChange={(e) => setSearch(e.target.value)} autoFocus />
              </div>
              {filtered.length === 0 && <div className="px-3 py-2 text-sm text-[rgba(0,0,0,0.25)]">无匹配项</div>}
              {filtered.map(o => {
                const key = o.value || o.id || o.name;
                const label = renderOption ? renderOption(o) : o.label || o.name || '';
                return (
                  <div key={key} className={`px-3 py-1.5 text-sm cursor-pointer transition-colors ${key === value ? 'bg-[#e6f7ff] text-[#1890ff]' : 'hover:bg-[#f5f5f5]'}`}
                    onClick={() => { onChange(key); setOpen(false); setSearch(''); }}>
                    {label}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function ConfirmPopover({ visible, onConfirm, onCancel, message }) {
      if (!visible) return null;
      return (
        <div className="confirm-popover">
          <div className="text-sm text-[rgba(0,0,0,0.88)] mb-2 flex items-center gap-1.5">
            <svg className="w-4 h-4 text-[#faad14] flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
            </svg>
            {message}
          </div>
          <div className="flex justify-end gap-2">
            <button className="h-6 px-2 text-xs rounded border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:border-[#1890ff] hover:text-[#1890ff] transition-colors" onClick={onCancel}>取消</button>
            <button className="h-6 px-2 text-xs rounded bg-[#ff4d4f] text-white border-none hover:bg-[#ff7875] transition-colors" onClick={onConfirm}>确认删除</button>
          </div>
        </div>
      );
    }

    /* ================================================================
     *  数据流可视化组件 — 原始报文 → 属性映射 → 标准上下文
     * ================================================================ */
    function DataFlowVisualization({ payload, properties, eventPointCode }) {
      const [expanded, setExpanded] = useState(false);

      // 从 properties 配置中构建标准上下文
      const standardContext = useMemo(() => {
        const ctx = {};
        properties.forEach(p => {
          if (p.status !== 1) return;
          const path = p.fieldName;
          const parts = path.split('.');
          let val = payload;
          for (const part of parts) {
            val = val?.[part];
          }
          if (val !== undefined) ctx[p.name] = val;
        });
        return ctx;
      }, [payload, properties]);

      return (
        <div className="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden mb-4">
          <div className="flex items-center justify-between px-4 py-2.5 cursor-pointer hover:bg-[#fafafa] transition-colors"
            onClick={() => setExpanded(!expanded)}>
            <div className="flex items-center gap-2">
              <svg className="w-4 h-4 text-[#faad14]" fill="currentColor" viewBox="0 0 20 20">
                <path fillRule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clipRule="evenodd" />
              </svg>
              <span className="text-sm font-medium text-[rgba(0,0,0,0.88)]">数据流预览</span>
              <span className="text-xs text-[rgba(0,0,0,0.45)]">— 查看原始报文如何被翻译为标准属性</span>
            </div>
            <svg className={`w-4 h-4 text-[rgba(0,0,0,0.45)] transition-transform ${expanded ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
            </svg>
          </div>
          <div className={`expand-section ${expanded ? 'open' : ''}`}>
            <div className="expand-inner">
              <div className="px-4 pb-4 border-t border-[#f0f0f0]">
                <div className="grid grid-cols-[1fr_40px_1fr_40px_1fr] gap-0 items-start mt-3">
                  {/* 原始报文 */}
                  <div>
                    <div className="text-xs font-medium text-[rgba(0,0,0,0.45)] mb-2 flex items-center gap-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-[#ff4d4f]"></span>
                      原始报文（上游方言）
                    </div>
                    <pre className="text-xs bg-[#fafafa] rounded-md p-3 border border-[#f0f0f0] overflow-auto max-h-[280px] leading-relaxed font-mono" style={{ tabSize: 2 }}>
                      {JSON.stringify(payload, null, 2)}
                    </pre>
                  </div>

                  {/* 箭头 1 */}
                  <div className="flex flex-col items-center justify-center pt-8">
                    <svg className="w-6 h-6 text-[#1890ff] flow-arrow" fill="currentColor" viewBox="0 0 20 20">
                      <path fillRule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clipRule="evenodd" />
                    </svg>
                    <span className="text-[10px] text-[rgba(0,0,0,0.25)] mt-1">映射</span>
                  </div>

                  {/* 映射规则 */}
                  <div>
                    <div className="text-xs font-medium text-[rgba(0,0,0,0.45)] mb-2 flex items-center gap-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-[#1890ff]"></span>
                      属性映射规则（PropertyPO）
                    </div>
                    <div className="bg-[#f0f7ff] rounded-md border border-[#d6e8fa] p-3 space-y-1.5 max-h-[280px] overflow-auto">
                      {properties.filter(p => p.status === 1).map(p => {
                        const path = p.fieldName;
                        const parts = path.split('.');
                        let val = payload;
                        for (const part of parts) val = val?.[part];
                        const found = val !== undefined;
                        return (
                          <div key={p.id} className="flex items-center text-xs gap-1">
                            <code className={`px-1 py-0.5 rounded font-mono ${found ? 'bg-white text-[rgba(0,0,0,0.65)]' : 'bg-[#fff1f0] text-[#ff4d4f] line-through'}`}>
                              {p.fieldName}
                            </code>
                            <svg className="w-3 h-3 text-[#1890ff] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                            <span className="font-medium text-[#1890ff]">{p.name}</span>
                            {found ? (
                              <span className="text-[#52c41a]">✓</span>
                            ) : (
                              <span className="text-[#ff4d4f] text-[10px]">(未匹配)</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 箭头 2 */}
                  <div className="flex flex-col items-center justify-center pt-8">
                    <svg className="w-6 h-6 text-[#52c41a] flow-arrow" style={{ animationDelay: '0.5s' }} fill="currentColor" viewBox="0 0 20 20">
                      <path fillRule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clipRule="evenodd" />
                    </svg>
                    <span className="text-[10px] text-[rgba(0,0,0,0.25)] mt-1">输出</span>
                  </div>

                  {/* 标准上下文 */}
                  <div>
                    <div className="text-xs font-medium text-[rgba(0,0,0,0.45)] mb-2 flex items-center gap-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-[#52c41a]"></span>
                      标准上下文（特征/规则消费）
                    </div>
                    <pre className="text-xs bg-[#f6ffed] rounded-md p-3 border border-[#b7eb8f] overflow-auto max-h-[280px] leading-relaxed font-mono" style={{ tabSize: 2 }}>
                      {JSON.stringify(standardContext, null, 2)}
                    </pre>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     *  PropertyCard — 属性管理卡片（内联展开 CRUD）
     * ================================================================ */
    function PropertyCard({
      eventPointCode,
      eventPointName,
      initialProperties = [],
      samplePayload,
      onAddProperty,
      onUpdateProperty,
      onRemoveProperty,
    }) {
      const [properties, setProperties] = useState(initialProperties);
      const [isAdding, setIsAdding] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [confirmId, setConfirmId] = useState(null);

      const emptyForm = { name: '', description: '', fieldName: '', fieldType: 'STRING', validateType: '', validateArgs: '', status: 1 };
      const [addForm, setAddForm] = useState({ ...emptyForm });
      const [editForm, setEditForm] = useState({ ...emptyForm });
      const [formErrors, setFormErrors] = useState({});

      const validate = (form) => {
        const errors = {};
        if (!form.name.trim()) errors.name = '请输入标准属性名';
        if (!/^[a-z][a-z0-9_]*$/.test(form.name)) errors.name = '小写字母+下划线+数字，字母开头';
        if (!form.description.trim()) errors.description = '请输入中文描述';
        if (!form.fieldName.trim()) errors.fieldName = '请输入提取路径';
        // 重名检查（新增时检查所有，编辑时排除自身）
        const existing = properties.find(p => p.name === form.name && p.id !== editingId);
        if (existing) errors.name = '属性名已存在';
        setFormErrors(errors);
        return Object.keys(errors).length === 0;
      };

      const handleAddSave = () => {
        if (!validate(addForm)) return;
        const newProp = { ...addForm, id: Date.now().toString() };
        setProperties(prev => [...prev, newProp]);
        onAddProperty?.(newProp);
        setAddForm({ ...emptyForm });
        setFormErrors({});
        setIsAdding(false);
      };

      const handleEditStart = (prop) => {
        setEditingId(prop.id);
        setEditForm({ ...prop });
        setFormErrors({});
        setIsAdding(false);
      };

      const handleEditSave = () => {
        if (!validate(editForm)) return;
        setProperties(prev => prev.map(p => p.id === editingId ? { ...editForm } : p));
        onUpdateProperty?.(editForm);
        setEditingId(null);
        setFormErrors({});
      };

      const handleRemove = (id) => {
        setProperties(prev => prev.filter(p => p.id !== id));
        onRemoveProperty?.(id);
        setConfirmId(null);
      };

      const handleToggleStatus = (prop) => {
        const updated = { ...prop, status: prop.status === 1 ? 0 : 1 };
        setProperties(prev => prev.map(p => p.id === prop.id ? updated : p));
        onUpdateProperty?.(updated);
      };

      // 内联编辑表单（复用于新增和编辑）
      const renderForm = (form, setForm, onSave, onCancel) => (
        <div className="bg-[#fafafa] border-t border-[#f0f0f0] px-4 py-4" style={{ boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.04)' }}>
          <div className="grid grid-cols-3 gap-x-4 gap-y-3">
            {/* 标准属性名 */}
            <div>
              <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">标准属性名 <span className="text-[#ff4d4f]">*</span></label>
              <input type="text" className="w-full h-8 border border-[#d9d9d9] rounded-md px-3 text-sm font-mono outline-none focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)] transition-all bg-white placeholder:text-[rgba(0,0,0,0.25)]"
                placeholder="如：user_id" value={form.name}
                onChange={(e) => { setForm(prev => ({ ...prev, name: e.target.value })); setFormErrors(prev => ({ ...prev, name: undefined })); }} />
              {formErrors.name && <span className="text-xs text-[#ff4d4f] mt-0.5 block">{formErrors.name}</span>}
            </div>

            {/* 中文描述 */}
            <div>
              <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">中文描述 <span className="text-[#ff4d4f]">*</span></label>
              <input type="text" className="w-full h-8 border border-[#d9d9d9] rounded-md px-3 text-sm outline-none focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)] transition-all bg-white placeholder:text-[rgba(0,0,0,0.25)]"
                placeholder="如：用户ID" value={form.description}
                onChange={(e) => { setForm(prev => ({ ...prev, description: e.target.value })); setFormErrors(prev => ({ ...prev, description: undefined })); }} />
              {formErrors.description && <span className="text-xs text-[#ff4d4f] mt-0.5 block">{formErrors.description}</span>}
            </div>

            {/* 字段提取路径 */}
            <div>
              <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">字段提取路径 <span className="text-[#ff4d4f]">*</span></label>
              <input type="text" className="w-full h-8 border border-[#d9d9d9] rounded-md px-3 text-sm font-mono outline-none focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)] transition-all bg-white placeholder:text-[rgba(0,0,0,0.25)]"
                placeholder="如：properties.fromUserId" value={form.fieldName}
                onChange={(e) => { setForm(prev => ({ ...prev, fieldName: e.target.value })); setFormErrors(prev => ({ ...prev, fieldName: undefined })); }} />
              {formErrors.fieldName && <span className="text-xs text-[#ff4d4f] mt-0.5 block">{formErrors.fieldName}</span>}
            </div>

            {/* 字段类型 */}
            <div>
              <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">字段类型</label>
              <SearchSelect value={form.fieldType} onChange={(v) => setForm(prev => ({ ...prev, fieldType: v }))}
                options={FIELD_TYPES} placeholder="选择类型" renderOption={(o) => o.label} />
            </div>

            {/* 校验类型 */}
            <div>
              <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">校验类型</label>
              <SearchSelect value={form.validateType} onChange={(v) => setForm(prev => ({ ...prev, validateType: v }))}
                options={VALIDATE_TYPES} placeholder="选择校验规则" renderOption={(o) => o.label} />
            </div>

            {/* 校验参数 */}
            <div>
              <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">校验参数（选填）</label>
              <input type="text" className="w-full h-8 border border-[#d9d9d9] rounded-md px-3 text-sm outline-none focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)] transition-all bg-white placeholder:text-[rgba(0,0,0,0.25)]"
                placeholder="如正则表达式或长度值" value={form.validateArgs}
                onChange={(e) => setForm(prev => ({ ...prev, validateArgs: e.target.value }))} />
            </div>
          </div>

          <div className="flex justify-end gap-2 mt-4 pt-3 border-t border-[#f0f0f0]">
            <button className="h-8 px-4 text-sm rounded-md border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:text-[#1890ff] hover:border-[#1890ff] transition-colors" onClick={onCancel}>取消</button>
            <button className="h-8 px-4 text-sm rounded-md bg-[#1890ff] text-white border-none hover:bg-[#40a9ff] transition-colors" onClick={onSave}>保存</button>
          </div>
        </div>
      );

      return (
        <div>
          {/* 数据流预览 */}
          {samplePayload && (
            <DataFlowVisualization payload={samplePayload} properties={properties} eventPointCode={eventPointCode} />
          )}

          {/* 属性列表卡片 */}
          <div className="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
            {/* 表头 */}
            <div className="flex items-center justify-between px-4 py-3 border-b border-[#f0f0f0]">
              <div className="flex items-center gap-2">
                <svg className="w-4 h-4 text-[#1890ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                </svg>
                <span className="text-sm font-medium text-[rgba(0,0,0,0.88)]">标准属性列表</span>
                <span className="text-xs text-[rgba(0,0,0,0.45)]">({properties.filter(p => p.status === 1).length} 个启用 / {properties.length} 个总计)</span>
              </div>
            </div>

            {/* 属性表格 */}
            <div className="px-4 py-2">
              {properties.length === 0 ? (
                <div className="py-8 text-center text-sm text-[rgba(0,0,0,0.25)]">
                  暂无属性配置，点击下方按钮添加第一个标准属性映射
                </div>
              ) : (
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-xs text-[rgba(0,0,0,0.45)] border-b border-[#f0f0f0]">
                      <th className="text-left py-2 px-2 font-normal">属性信息</th>
                      <th className="text-left py-2 px-2 font-normal">提取路径</th>
                      <th className="text-left py-2 px-2 font-normal w-[80px]">类型</th>
                      <th className="text-left py-2 px-2 font-normal w-[130px]">校验规则</th>
                      <th className="text-center py-2 px-2 font-normal w-[60px]">状态</th>
                      <th className="text-center py-2 px-2 font-normal w-[90px]">操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    {properties.map((p) => (
                      <React.Fragment key={p.id}>
                        <tr className={`border-b border-[#f0f0f0] last:border-b-0 transition-colors ${editingId === p.id ? 'editing-row' : 'hover:bg-[#fafafa]'} ${p.status !== 1 ? 'opacity-50' : ''}`}>
                          <td className="py-2 px-2">
                            <div className="text-[#1890ff] text-sm font-mono cursor-pointer hover:text-[#40a9ff]">{p.name}</div>
                            <div className="text-xs text-[rgba(0,0,0,0.45)] mt-0.5">{p.description}</div>
                          </td>
                          <td className="py-2 px-2">
                            <code className="text-xs bg-[#f5f5f5] px-1.5 py-0.5 rounded text-[rgba(0,0,0,0.65)] font-mono">{p.fieldName}</code>
                          </td>
                          <td className="py-2 px-2"><FieldTypeTag type={p.fieldType} /></td>
                          <td className="py-2 px-2"><ValidateTag type={p.validateType} args={p.validateArgs} /></td>
                          <td className="py-2 px-2 text-center">
                            <StatusToggle enabled={p.status === 1} onChange={() => handleToggleStatus(p)} />
                          </td>
                          <td className="py-2 px-2 text-center relative">
                            <div className="flex items-center justify-center gap-2">
                              <button className="text-xs text-[rgba(0,0,0,0.45)] hover:text-[#1890ff] transition-colors"
                                onClick={() => editingId === p.id ? (setEditingId(null), setFormErrors({})) : handleEditStart(p)}>
                                {editingId === p.id ? '取消' : '编辑'}
                              </button>
                              <button className="text-xs text-[rgba(0,0,0,0.45)] hover:text-[#ff4d4f] transition-colors"
                                onClick={() => setConfirmId(confirmId === p.id ? null : p.id)}>
                                删除
                              </button>
                              <ConfirmPopover visible={confirmId === p.id} message="确认删除该属性？" onConfirm={() => handleRemove(p.id)} onCancel={() => setConfirmId(null)} />
                            </div>
                          </td>
                        </tr>
                        {/* 行内编辑区（展开） */}
                        {editingId === p.id && (
                          <tr>
                            <td colSpan={6} className="p-0">
                              {renderForm(
                                editForm, setEditForm,
                                handleEditSave,
                                () => { setEditingId(null); setFormErrors({}); }
                              )}
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

            {/* 添加按钮 */}
            {!isAdding && (
              <div className="px-4 pb-3">
                <button className="w-full h-9 border border-dashed border-[#d9d9d9] rounded-md text-sm text-[rgba(0,0,0,0.45)] hover:text-[#1890ff] hover:border-[#1890ff] transition-all flex items-center justify-center gap-1"
                  onClick={() => { setIsAdding(true); setEditingId(null); setAddForm({ ...emptyForm }); setFormErrors({}); }}>
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                  添加标准属性
                </button>
              </div>
            )}

            {/* 新增表单区 */}
            <div className={`expand-section ${isAdding ? 'open' : ''}`}>
              <div className="expand-inner">
                {renderForm(
                  addForm, setAddForm,
                  handleAddSave,
                  () => { setIsAdding(false); setAddForm({ ...emptyForm }); setFormErrors({}); }
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     *  Tab 切换组件
     * ================================================================ */
    function TabSwitch({ tabs, activeKey, onChange }) {
      return (
        <div className="flex border-b border-[#f0f0f0] mb-4">
          {tabs.map(tab => (
            <button key={tab.key}
              className={`px-4 py-2.5 text-sm font-medium transition-colors relative ${activeKey === tab.key ? 'text-[#1890ff]' : 'text-[rgba(0,0,0,0.65)] hover:text-[#1890ff]'}`}
              onClick={() => onChange(tab.key)}>
              {tab.label}
              {activeKey === tab.key && <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-[#1890ff]" />}
            </button>
          ))}
        </div>
      );
    }

    /* ================================================================
     *  Demo 页面
     * ================================================================ */
    function App() {
      const [activeEP, setActiveEP] = useState('EP00000005');

      const epTabs = [
        { key: 'EP00000005', label: 'EP00000005 App提现' },
        { key: 'EP00010001', label: 'EP00010001 登录风控' },
      ];

      return (
        <div className="max-w-[1200px] mx-auto py-8 px-6">
          {/* 面包屑 */}
          <div className="flex items-center gap-1.5 text-sm text-[rgba(0,0,0,0.45)] mb-4">
            <span className="hover:text-[#1890ff] cursor-pointer">数据配置</span>
            <span>/</span>
            <span className="hover:text-[#1890ff] cursor-pointer">接入点管理</span>
            <span>/</span>
            <span className="text-[rgba(0,0,0,0.88)]">属性管理</span>
          </div>

          {/* 页面标题 */}
          <div className="mb-6">
            <h1 className="text-lg font-semibold text-[rgba(0,0,0,0.88)] mb-1">属性管理（变量映射）</h1>
            <p className="text-sm text-[rgba(0,0,0,0.45)]">
              将上游业务方的原始字段（方言）翻译为风控系统的标准属性（普通话）。特征、规则、策略统一消费标准属性，不直接读取原始报文。
            </p>
          </div>

          {/* 接入点切换 */}
          <TabSwitch tabs={epTabs} activeKey={activeEP} onChange={setActiveEP} />

          {/* EP00000005 提现 */}
          {activeEP === 'EP00000005' && (
            <PropertyCard
              eventPointCode="EP00000005"
              eventPointName="App提现"
              initialProperties={MOCK_PROPERTIES_EP5}
              samplePayload={SAMPLE_PAYLOAD_WITHDRAW}
              onAddProperty={(p) => console.log('EP5 add:', p)}
              onUpdateProperty={(p) => console.log('EP5 update:', p)}
              onRemoveProperty={(id) => console.log('EP5 remove:', id)}
            />
          )}

          {/* EP00010001 登录 */}
          {activeEP === 'EP00010001' && (
            <PropertyCard
              eventPointCode="EP00010001"
              eventPointName="登录风控"
              initialProperties={MOCK_PROPERTIES_EP_LOGIN}
              samplePayload={SAMPLE_PAYLOAD_LOGIN}
              onAddProperty={(p) => console.log('EP_LOGIN add:', p)}
              onUpdateProperty={(p) => console.log('EP_LOGIN update:', p)}
              onRemoveProperty={(id) => console.log('EP_LOGIN remove:', id)}
            />
          )}

          {/* 底部说明 */}
          <div className="mt-6 p-4 bg-[#e6f7ff] border border-[#91d5ff] rounded-lg text-sm text-[rgba(0,0,0,0.65)]">
            <div className="font-medium text-[rgba(0,0,0,0.88)] mb-2 flex items-center gap-1.5">
              <svg className="w-4 h-4 text-[#1890ff]" fill="currentColor" viewBox="0 0 20 20">
                <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" />
              </svg>
              数据流说明
            </div>
            <div className="space-y-1.5">
              <p><strong>第 1 层 — 原始报文：</strong>上游业务方的"方言"（<code className="bg-white px-1 rounded">properties.fromUserId</code>、<code className="bg-white px-1 rounded">properties.amount</code>）</p>
              <p><strong>第 2 层 — 属性映射：</strong>PropertyPO 将方言翻译为标准属性名（<code className="bg-white px-1 rounded">user_id</code>、<code className="bg-white px-1 rounded">trade_amount</code>）</p>
              <p><strong>第 3 层 — 标准上下文：</strong>特征/规则/策略只看到干净的标准属性，不关心原始报文长什么样</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
