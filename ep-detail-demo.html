    // 获取值的JS类型标签
    function getTypeLabel(val) {
      if (val === null || val === undefined) return 'Null';
      if (typeof val === 'number') return Number.isInteger(val) ? 'Integer' : 'Double';
      if (typeof val === 'boolean') return 'Boolean';
      if (typeof val === 'string') return 'String';
      return typeof val;
    }

    // 单步转换，返回 { value, type, error }
    function applyTransformer(val, operator, params) {
      try {
        switch (operator) {
          case 'SCALE': {
            const n = Number(val);
            if (isNaN(n)) return { value: val, type: getTypeLabel(val), error: '无法转为数字' };
            const divisor = Number(params.divisor);
            if (!divisor) return { value: val, type: getTypeLabel(val), error: '除数不能为0' };
            const result = n / divisor;
            return { value: result, type: getTypeLabel(result), error: null };
          }
          case 'OFFSET': {
            const n = Number(val);
            if (isNaN(n)) return { value: val, type: getTypeLabel(val), error: '无法转为数字' };
            const result = n + Number(params.offset || 0);
            return { value: result, type: getTypeLabel(result), error: null };
          }
          case 'ABS': {
            const n = Number(val);
            if (isNaN(n)) return { value: val, type: getTypeLabel(val), error: '无法转为数字' };
            const result = Math.abs(n);
            return { value: result, type: getTypeLabel(result), error: null };
          }
          case 'TO_INT': {
            const n = Number(val);
            if (isNaN(n)) return { value: val, type: getTypeLabel(val), error: '无法转为数字' };
            const result = Math.floor(n);
            return { value: result, type: 'Integer', error: null };
          }
          case 'TO_DOUBLE': {
            const n = Number(val);
            if (isNaN(n)) return { value: val, type: getTypeLabel(val), error: '无法转为数字' };
            const result = parseFloat(n);
            return { value: result, type: 'Double', error: null };
          }
          case 'TO_STR': {
            const result = String(val);
            return { value: result, type: 'String', error: null };
          }
          case 'FROM_WEI': {
            const n = Number(val);
            if (isNaN(n)) return { value: val, type: getTypeLabel(val), error: '无法转为数字' };
            const result = n / 1e18;
            return { value: result, type: 'Double', error: null };
          }
          case 'SUB_STR': {
            const s = String(val);
            const [start, len] = (params.range || '0,0').split(',').map(Number);
            const result = s.substring(start, start + len);
            return { value: result, type: 'String', error: null };
          }
          case 'TRIM': {
            const result = String(val).trim();
            return { value: result, type: 'String', error: null };
          }
          case 'CUSTOM': {
            const expr = params.expression || 'val';
            try {
              const fn = new Function('val', `return (${expr});`);
              const result = fn(val);
              return { value: result, type: getTypeLabel(result), error: null };
            } catch (e) {
              return { value: val, type: getTypeLabel(val), error: `表达式错误: ${e.message}` };
            }
          }
          default:
            return { value: val, type: getTypeLabel(val), error: `未知算子: ${operator}` };
        }
      } catch (e) {
        return { value: val, type: getTypeLabel(val), error: e.message };
      }
    }

    // 执行整个 pipeline，返回每一步的结果数组
    function runPipeline(rawValue, transformers) {
      const steps = [{
        step: 0,
        label: '提取原始值',
        value: rawValue,
        type: rawValue === undefined ? 'Null' : getTypeLabel(rawValue),
        error: rawValue === undefined ? '路径未匹配' : null,
      }];
      if (rawValue === undefined || !transformers || transformers.length === 0) return steps;
      let current = rawValue;
      transformers.forEach((t, i) => {
        const opDef = OPERATORS.find(o => o.value === t.operator);
        const paramStr = t.params && Object.values(t.params).filter(Boolean).join(',');
        const label = paramStr ? `${t.operator}(${paramStr})` : t.operator;
        const result = applyTransformer(current, t.operator, t.params || {});
        steps.push({ step: i + 1, label, value: result.value, type: result.type, error: result.error });
        if (!result.error) current = result.value;
      });
      return steps;
    }

    function SearchSelect({ value, onChange, options, placeholder, renderOption, disabled }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');
      const ref = useRef(null);
      useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);
      const filtered = options.filter(o => {
        if (o.disabled) return true;
        const label = renderOption ? renderOption(o) : o.label || o.name || '';
        return label.toLowerCase().includes(search.toLowerCase());
      });
      const selected = options.find(o => (o.value !== undefined ? o.value : o.id || o.name) === value);

                    onClick={() => { if (!o.disabled) { onChange(key); setOpen(false); setSearch(''); } }}>

                  </div>
                );

        LONG: { color: '#722ed1', bg: '#f9f0ff' },

      const c = colorMap[type] || colorMap.STRING;
      return (
        <span className="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-mono whitespace-nowrap flex-shrink-0"
          style={{ color: c.color, background: c.bg, border: `1px solid ${c.color}25` }}>
          {type}
        </span>
      );
    }

    function ValidateTag({ type, args }) {
      if (!type) return <span className="text-[rgba(0,0,0,0.25)]">-</span>;
      const label = VALIDATE_TYPES.find(v => v.value === type)?.label || type;
      return (
        <span className="inline-flex items-center gap-1 text-xs text-[rgba(0,0,0,0.65)]">
          <span className="px-1.5 py-0.5 rounded bg-[#f5f5f5]">{label}</span>
          {args && <code className="text-[#722ed1] bg-[#f9f0ff] px-1 py-0.5 rounded">{args}</code>}
        </span>
      );
    }

    function TransformerTags({ transformers }) {
      if (!transformers || transformers.length === 0) {
        return <span className="text-xs text-[rgba(0,0,0,0.25)]">—</span>;
      }
      return (
        <div className="flex flex-wrap gap-1">
          {transformers.map((t, i) => {
            const paramStr = t.params && Object.values(t.params).filter(Boolean).join(',');
            const label = paramStr ? `${t.operator}(${paramStr})` : t.operator;
            return (
              <span key={i} className="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-mono whitespace-nowrap flex-shrink-0 text-[#1890ff] bg-[#e6f7ff] border border-[#91d5ff]">
                {label}
              </span>
            );
          })}
        </div>
      );
    }

    function TransformerModal({ extraction, stdProp, payload, onSave, onClose }) {
      const [fieldName, setFieldName] = useState(extraction.fieldName);
      const [transformers, setTransformers] = useState(
        extraction.transformers ? extraction.transformers.map((t, i) => ({ ...t, _key: i })) : []
      );
      const [nextKey, setNextKey] = useState(extraction.transformers ? extraction.transformers.length : 0);

      const getValueByPath = (obj, path) => {
        return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
      };

      const rawValue = getValueByPath(payload, fieldName);
      const pipelineSteps = runPipeline(rawValue, transformers);
      const finalStep = pipelineSteps[pipelineSteps.length - 1];
      const hasError = pipelineSteps.some(s => s.error);

      const addStep = () => {
        setTransformers([...transformers, { operator: 'TO_STR', params: {}, _key: nextKey }]);
        setNextKey(nextKey + 1);
      };

      const removeStep = (idx) => {
        setTransformers(transformers.filter((_, i) => i !== idx));
      };

      const updateStep = (idx, field, value) => {
        setTransformers(transformers.map((t, i) => {
          if (i !== idx) return t;
          if (field === 'operator') {
            return { ...t, operator: value, params: {} };
          }
          return { ...t, params: { ...t.params, [field]: value } };
        }));
      };

      const moveStep = (idx, dir) => {
        const newArr = [...transformers];
        const target = idx + dir;
        if (target < 0 || target >= newArr.length) return;
        [newArr[idx], newArr[target]] = [newArr[target], newArr[idx]];
        setTransformers(newArr);
      };

      const handleSave = () => {
        const cleanTransformers = transformers.map(({ _key, ...rest }) => rest);
        onSave({ fieldName, transformers: cleanTransformers });
      };

      return (
        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal-card">
            {/* Header */}
            <div className="px-6 py-4 border-b border-[rgba(5,5,5,0.06)] flex items-center justify-between">
              <div>
                <h3 className="text-base font-semibold text-[rgba(0,0,0,0.88)]">
                  编辑提取规则 — {extraction.propertyName}
                </h3>
                <span className="text-xs text-[rgba(0,0,0,0.45)]">{extraction.propertyDesc}</span>
              </div>
              <button className="text-[rgba(0,0,0,0.45)] hover:text-[rgba(0,0,0,0.88)] transition-colors" onClick={onClose}>
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>

            {/* Body */}
            <div className="px-6 py-4 overflow-auto flex-1 space-y-5">
              {/* 标准属性规范（只读） */}
              <div className="bg-[#fafafa] rounded-lg p-3 border border-[#f0f0f0]">
                <div className="text-xs text-[rgba(0,0,0,0.45)] mb-2 font-medium">标准属性规范（全局字典定义）</div>
                <div className="flex items-center gap-4">
                  <span className="text-sm text-[rgba(0,0,0,0.88)]">{stdProp ? stdProp.description : '-'}</span>
                  {stdProp && <FieldTypeTag type={stdProp.fieldType} />}
                  {stdProp && <ValidateTag type={stdProp.validateType} args={stdProp.validateArgs} />}
                </div>
              </div>

              {/* 提取路径 */}
              <div>
                <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1 font-medium">提取路径</label>
                <input
                  type="text"
                  className="w-full border rounded-md px-3 h-8 text-sm font-mono outline-none bg-white transition-colors border-[#d9d9d9] focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)]"
                  value={fieldName}
                  onChange={(e) => setFieldName(e.target.value)}
                  placeholder="如 properties.amount"
                />
              </div>

              {/* 转换管道 */}
              <div>
                <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-2 font-medium">转换管道</label>
                <div className="space-y-2">
                  {transformers.map((t, idx) => {
                    const opDef = OPERATORS.find(o => o.value === t.operator);
                    return (
                      <div key={t._key} className="flex items-center gap-2 bg-[#fafafa] rounded-md px-3 py-2 border border-[#f0f0f0]">
                        <span className="text-xs text-[rgba(0,0,0,0.45)] w-16 flex-shrink-0">Step {idx + 1}</span>
                        <select
                          className="h-7 px-2 text-sm border border-[#d9d9d9] rounded-md outline-none bg-white focus:border-[#1890ff] min-w-[160px]"
                          value={t.operator}
                          onChange={(e) => updateStep(idx, 'operator', e.target.value)}
                        >
                          {OPERATORS.map(op => (
                            <option key={op.value} value={op.value}>{op.label}</option>
                          ))}
                        </select>
                        {opDef && opDef.hasParam && opDef.paramKey !== 'expression' && (
                          <input
                            type="text"
                            className="h-7 px-2 text-sm border border-[#d9d9d9] rounded-md outline-none bg-white focus:border-[#1890ff] w-28 font-mono"
                            placeholder={opDef.paramLabel}
                            value={t.params[opDef.paramKey] || ''}
                            onChange={(e) => updateStep(idx, opDef.paramKey, e.target.value)}
                          />
                        )}
                        {opDef && opDef.paramKey === 'expression' && (
                          <input
                            type="text"
                            className="h-7 px-2 text-sm border border-[#d9d9d9] rounded-md outline-none bg-white focus:border-[#1890ff] flex-1 font-mono"
                            placeholder="val * 2 + 1"
                            value={t.params.expression || ''}
                            onChange={(e) => updateStep(idx, 'expression', e.target.value)}
                          />
                        )}
                        <div className="flex items-center gap-1 ml-auto flex-shrink-0">
                          <button className="text-[rgba(0,0,0,0.25)] hover:text-[rgba(0,0,0,0.65)] transition-colors disabled:opacity-30" disabled={idx === 0} onClick={() => moveStep(idx, -1)} title="上移">↑</button>
                          <button className="text-[rgba(0,0,0,0.25)] hover:text-[rgba(0,0,0,0.65)] transition-colors disabled:opacity-30" disabled={idx === transformers.length - 1} onClick={() => moveStep(idx, 1)} title="下移">↓</button>
                          <button className="text-[#ff4d4f] hover:text-[#ff7875] transition-colors ml-1" onClick={() => removeStep(idx)} title="删除">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <button
                  className="mt-2 h-8 px-4 text-sm rounded-md border border-dashed border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:border-[#1890ff] hover:text-[#1890ff] transition-colors w-full"
                  onClick={addStep}
                >
                  + 添加转换步骤
                </button>
              </div>

              {/* 实时预览 */}
              <div>
                <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-2 font-medium">实时预览（基于示例报文）</label>
                <div className="bg-[#fafafa] rounded-lg p-3 border border-[#f0f0f0] space-y-1.5">
                  {pipelineSteps.map((step, i) => {
                    const isError = !!step.error;
                    const isLast = i === pipelineSteps.length - 1 && !hasError;
                    return (
                      <div key={i} className={`flex items-center gap-2 text-xs ${isError ? 'text-[#ff4d4f]' : ''}`}>
                        <span className="text-[rgba(0,0,0,0.45)] w-6 text-right flex-shrink-0">{i + 1}.</span>
                        <span className="font-medium min-w-[100px]">{step.label}</span>
                        <span className="text-[rgba(0,0,0,0.25)]">→</span>
                        <code className={`font-mono px-1.5 py-0.5 rounded ${isError ? 'bg-[#fff2f0] text-[#ff4d4f]' : isLast ? 'bg-[#f6ffed] text-[#52c41a] font-semibold' : 'bg-white text-[rgba(0,0,0,0.65)]'}`}>
                          {isError ? step.error : JSON.stringify(step.value)}
                        </code>
                        <span className="text-[rgba(0,0,0,0.25)] text-[10px]">({step.type})</span>
                      </div>
                    );
                  })}
                  {!hasError && stdProp && (
                    <div className="flex items-center gap-2 text-xs border-t border-[#f0f0f0] pt-1.5 mt-1.5">
                      <span className="text-[rgba(0,0,0,0.45)] w-6 text-right flex-shrink-0">{pipelineSteps.length + 1}.</span>
                      <span className="font-medium min-w-[100px]">校验 ({stdProp.validateType || '无'})</span>
                      <span className="text-[rgba(0,0,0,0.25)]">→</span>
                      <span className="text-[#52c41a]">✅ 通过</span>
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="px-6 py-3 border-t border-[rgba(5,5,5,0.06)] flex items-center justify-end gap-2">
              <button className="h-8 px-4 text-sm rounded-md border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:border-[#1890ff] hover:text-[#1890ff] transition-colors" onClick={onClose}>取消</button>
              <button className="h-8 px-4 text-sm rounded-md bg-[#1890ff] text-white border-none hover:bg-[#40a9ff] transition-colors" onClick={handleSave}>确定</button>
            </div>
          </div>
        </div>
      );
    }

    function ActionTag({ action }) {
      const map = {
        READ: { color: '#1890ff', bg: '#e6f7ff', label: 'READ' },
        WRITE: { color: '#52c41a', bg: '#f6ffed', label: 'WRITE' },
        DELETE: { color: '#ff4d4f', bg: '#fff1f0', label: 'DELETE' },
      };
      const c = map[action] || map.READ;
      return (
        <span className="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-mono whitespace-nowrap flex-shrink-0"
          style={{ color: c.color, background: c.bg, border: `1px solid ${c.color}25` }}>
          {c.label}
        </span>
      );
    }

    /* ================================================================
     *  数据流可视化（可折叠）
     * ================================================================ */
    function DataFlowVisualization({ extractions, payload }) {
      const [expanded, setExpanded] = useState(false);

      // 从 payload 中按路径取值
      const getValueByPath = (obj, path) => {
        return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
      };

      // 构建标准上下文输出
      const standardContext = {};
      extractions.filter(e => e.status === 1).forEach(e => {
        const val = getValueByPath(payload, e.fieldName);
        if (val !== undefined) {
          standardContext[e.propertyName] = val;
        }
      });

      return (
        <div className="bg-white rounded-lg border border-slate-200 shadow-sm mb-4">
          <div className="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-[#fafafa] transition-colors" onClick={() => setExpanded(!expanded)}>
            <div className="flex items-center gap-2">
              <svg className={`w-4 h-4 text-[rgba(0,0,0,0.45)] transition-transform ${expanded ? 'rotate-90' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
              </svg>
              <span className="text-sm font-medium text-[rgba(0,0,0,0.88)]">数据流预览</span>
              <span className="text-xs text-[rgba(0,0,0,0.45)]">（查看报文映射和标准上下文输出）</span>
            </div>
          </div>
          <div className={`expand-section ${expanded ? 'open' : ''}`}>
            <div className="expand-inner">
              <div className="px-4 pb-4">
                <div className="grid gap-0" style={{ gridTemplateColumns: '1fr 40px 1fr 40px 1fr' }}>
                  {/* 原始报文 */}
                  <div>
                    <div className="text-xs text-[rgba(0,0,0,0.45)] mb-2 font-medium">原始报文</div>
                    <pre className="text-xs font-mono bg-[#fafafa] rounded-lg p-3 overflow-auto max-h-[300px] border border-[#f0f0f0]" style={{ whiteSpace: 'pre-wrap', wordBreak: 'break-all' }}>
                      {JSON.stringify(payload, null, 2)}
                    </pre>
                  </div>
                  {/* 箭头 */}
                  <div className="flex flex-col items-center justify-center">
                    <svg className="w-6 h-6 text-[#1890ff] flow-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                    <span className="text-xs text-[rgba(0,0,0,0.45)] mt-1">映射</span>
                  </div>
                  {/* 映射规则 */}
                  <div>
                    <div className="text-xs text-[rgba(0,0,0,0.45)] mb-2 font-medium">映射规则</div>
                    <div className="bg-[#f0f7ff] rounded-lg p-3 border border-[#d6e4ff] space-y-1.5 max-h-[300px] overflow-auto">
                      {extractions.filter(e => e.status === 1).map(e => {
                        const val = getValueByPath(payload, e.fieldName);
                        const matched = val !== undefined;
                        return (
                          <div key={e.id} className={`flex items-center gap-2 text-xs ${matched ? '' : 'opacity-60'}`}>
                            {matched ? (
                              <span className="text-[#52c41a] flex-shrink-0">&#10003;</span>
                            ) : (
                              <span className="text-[#ff4d4f] flex-shrink-0">&#10007;</span>
                            )}
                            <code className={`font-mono ${matched ? 'text-[rgba(0,0,0,0.65)]' : 'text-[rgba(0,0,0,0.45)] line-through'}`}>{e.fieldName}</code>
                            <span className="text-[rgba(0,0,0,0.25)]">&rarr;</span>
                            <span className={`font-mono font-medium ${matched ? 'text-[#1890ff]' : 'text-[rgba(0,0,0,0.45)]'}`}>{e.propertyName}</span>
                            {!matched && <span className="text-[#ff4d4f] text-xs">(未匹配)</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  {/* 箭头 */}
                  <div className="flex flex-col items-center justify-center">
                    <svg className="w-6 h-6 text-[#52c41a] flow-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                    <span className="text-xs text-[rgba(0,0,0,0.45)] mt-1">输出</span>
                  </div>
                  {/* 标准上下文 */}
                  <div>
                    <div className="text-xs text-[rgba(0,0,0,0.45)] mb-2 font-medium">标准上下文</div>
                    <pre className="text-xs font-mono bg-[#f6ffed] rounded-lg p-3 overflow-auto max-h-[300px] border border-[#b7eb8f]" style={{ whiteSpace: 'pre-wrap', wordBreak: 'break-all' }}>
                      {JSON.stringify(standardContext, null, 2)}
                    </pre>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     *  Tab 1: 属性提取配置
     * ================================================================ */
    function ExtractionCard({ extractions, setExtractions, payload, activeEP }) {
      const [addingNew, setAddingNew] = useState(false);
      const [modalExtId, setModalExtId] = useState(null);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [errors, setErrors] = useState({});

      const emptyForm = { propertyId: '', fieldName: '' };
      const [newForm, setNewForm] = useState({ ...emptyForm });

      // 切EP时重置
      useEffect(() => {
        setAddingNew(false);
        setDeleteConfirmId(null);
        setErrors({});
        setNewForm({ ...emptyForm });
      }, [activeEP]);

      // 已绑定的属性ID集合
      const boundPropertyIds = useMemo(() => new Set(extractions.map(e => e.propertyId)), [extractions]);

      // 标准属性选项（已绑定的灰显）
      const propertyOptions = useMemo(() => {
        return MOCK_STANDARD_PROPERTIES.map(p => ({
          ...p,
          value: p.id,
          disabled: boundPropertyIds.has(p.id),
        }));
      }, [boundPropertyIds]);

      const renderPropertyOption = (o) => `${o.description}（${o.name}）`;

      // 校验
      const validateForm = (form) => {
        const errs = {};
        if (!form.propertyId) errs.propertyId = '请选择标准属性';
        if (!form.fieldName.trim()) errs.fieldName = '提取路径不能为空';
        return errs;
      };

      const saveNew = () => {
        const errs = validateForm(newForm);
        if (Object.keys(errs).length > 0) { setErrors(errs); return; }
        const prop = MOCK_STANDARD_PROPERTIES.find(p => p.id === newForm.propertyId);
        const newExt = {
          id: String(Date.now()),
          propertyId: newForm.propertyId,
          propertyName: prop.name,
          propertyDesc: prop.description,
          fieldName: newForm.fieldName,
          status: 1,
        };
        setExtractions([...extractions, newExt]);
        setAddingNew(false);
        setNewForm({ ...emptyForm });
        setErrors({});
      };

      const handleDelete = (id) => {
        setExtractions(extractions.filter(e => e.id !== id));
        setDeleteConfirmId(null);
      };

      const handleModalSave = ({ fieldName, transformers }) => {
        setExtractions(extractions.map(e =>
          e.id === modalExtId ? { ...e, fieldName, transformers } : e
        ));
        setModalExtId(null);
      };

      const renderForm = (form, setForm, onSave, onCancel, isEdit) => {
        return (
          <div className="bg-[#fafafa] px-4 py-4" style={{ boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.04)' }}>
            <div className="grid grid-cols-3 gap-x-4 gap-y-3">
              <div>
                <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">标准属性</label>
                <SearchSelect
                  value={form.propertyId}
                  onChange={(v) => { setForm({ ...form, propertyId: v }); setErrors({ ...errors, propertyId: undefined }); }}
                  options={propertyOptions}
                  placeholder="选择标准属性"
                  renderOption={renderPropertyOption}
                  disabled={isEdit}
                />
                {errors.propertyId && <div className="text-xs text-[#ff4d4f] mt-0.5">{errors.propertyId}</div>}
              </div>
              <div>
                <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">字段提取路径</label>
                <input
                  type="text"
                  className={`w-full border rounded-md px-3 h-8 text-sm font-mono outline-none bg-white transition-colors border-[#d9d9d9] focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)] ${errors.fieldName ? 'border-[#ff4d4f]' : ''}`}
                  placeholder="如 properties.fromUserId"
                  value={form.fieldName}
                  onChange={(e) => { setForm({ ...form, fieldName: e.target.value }); setErrors({ ...errors, fieldName: undefined }); }}
                />
                {errors.fieldName && <div className="text-xs text-[#ff4d4f] mt-0.5">{errors.fieldName}</div>}
              </div>
              <div className="flex items-end justify-end gap-2">
                <button className="h-8 px-4 text-sm rounded-md border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:border-[#1890ff] hover:text-[#1890ff] transition-colors" onClick={onCancel}>取消</button>
                <button className="h-8 px-4 text-sm rounded-md bg-[#1890ff] text-white border-none hover:bg-[#40a9ff] transition-colors" onClick={onSave}>保存</button>
              </div>
            </div>
          </div>
        );
      };

      // lookup 标准属性
      const lookupProp = (propertyId) => MOCK_STANDARD_PROPERTIES.find(p => p.id === propertyId);

      return (
        <div>
          {/* 数据流预览 */}
          <DataFlowVisualization extractions={extractions} payload={payload} />

          {/* 表头 + 新增按钮 */}
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-medium text-[rgba(0,0,0,0.88)]">提取规则 ({extractions.length})</h3>
            <button
              className="h-8 px-4 text-sm rounded-md bg-[#1890ff] text-white border-none hover:bg-[#40a9ff] transition-colors flex items-center gap-1"
              onClick={() => { setAddingNew(true); setNewForm({ ...emptyForm }); setErrors({}); }}
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
              新增提取规则
            </button>
          </div>

          {/* 表格 */}
          <div className="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
            <table className="w-full" style={{ tableLayout: 'auto' }}>
              <thead>
                <tr className="bg-[#fafafa] border-b border-[#f0f0f0]">
                  <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">标准属性</th>
                  <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">提取路径</th>
                  <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">类型</th>
                  <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">转换规则</th>
                  <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">校验规则</th>
                  <th className="px-3 py-3 text-center text-xs font-medium text-[rgba(0,0,0,0.65)] w-[90px]">状态</th>
                  <th className="px-3 py-3 text-center text-xs font-medium text-[rgba(0,0,0,0.65)] w-[100px]">操作</th>
                </tr>
              </thead>
              <tbody>
                {extractions.map(ext => {
                  const stdProp = lookupProp(ext.propertyId);
                  return (
                    <React.Fragment key={ext.id}>
                      <tr className="border-b border-[#f0f0f0] hover:bg-[#fafafa] transition-colors">
                        <td className="px-3 py-3">
                          <div className="text-sm text-[#1890ff] cursor-pointer hover:underline">{ext.propertyName}</div>
                          <div className="text-xs text-[rgba(0,0,0,0.45)] mt-0.5">{ext.propertyDesc}</div>
                        </td>
                        <td className="px-3 py-3">
                          <code className="text-xs font-mono bg-[#f5f5f5] px-1.5 py-0.5 rounded text-[rgba(0,0,0,0.65)]">{ext.fieldName}</code>
                        </td>
                        <td className="px-3 py-3">
                          {stdProp ? <FieldTypeTag type={stdProp.fieldType} /> : '-'}
                        </td>
                        <td className="px-3 py-3">
                          <TransformerTags transformers={ext.transformers} />
                        </td>
                        <td className="px-3 py-3">
                          {stdProp ? <ValidateTag type={stdProp.validateType} args={stdProp.validateArgs} /> : '-'}
                        </td>
                        <td className="px-3 py-3 text-center">
                          <StatusToggle
                            enabled={ext.status === 1}
                            onChange={(v) => setExtractions(extractions.map(e => e.id === ext.id ? { ...e, status: v ? 1 : 0 } : e))}
                          />
                        </td>
                        <td className="px-3 py-3 text-center w-[100px]">
                          <div className="relative inline-flex items-center gap-2">
                            <button className="text-xs text-[#1890ff] hover:text-[#40a9ff] transition-colors" onClick={() => setModalExtId(ext.id)}>编辑</button>
                            <button className="text-xs text-[#ff4d4f] hover:text-[#ff7875] transition-colors" onClick={() => setDeleteConfirmId(ext.id)}>删除</button>
                            <ConfirmPopover
                              visible={deleteConfirmId === ext.id}
                              onConfirm={() => handleDelete(ext.id)}
                              onCancel={() => setDeleteConfirmId(null)}
                              message="确认删除该提取规则？"
                            />
                          </div>
                        </td>
                      </tr>
                    </React.Fragment>
                  );
                })}
                {extractions.length === 0 && (
                  <tr>
                    <td colSpan={7} className="px-3 py-8 text-center text-sm text-[rgba(0,0,0,0.25)]">暂无提取规则</td>
                  </tr>
                )}
              </tbody>
            </table>

            {/* 新增表单 */}
            <div className={`expand-section ${addingNew ? 'open' : ''}`}>
              <div className="expand-inner">
                {addingNew && renderForm(
                  newForm,
                  setNewForm,
                  saveNew,
                  () => { setAddingNew(false); setErrors({}); setNewForm({ ...emptyForm }); },
                  false
                )}
              </div>
            </div>
          </div>

          {modalExtId && (() => {
            const ext = extractions.find(e => e.id === modalExtId);
            if (!ext) return null;
            const stdProp = lookupProp(ext.propertyId);
            return (
              <TransformerModal
                extraction={ext}
                stdProp={stdProp}
                payload={payload}
                onSave={handleModalSave}
                onClose={() => setModalExtId(null)}
              />
            );
          })()}
        </div>
      );
    }

    /* ================================================================
     *  Tab 2: SceneCard 场景卡片
     * ================================================================ */
    function SceneCard({ sceneName, sceneCode, sceneColor, features, setFeatures, availableFeatures, availableProperties }) {
      const [addingNew, setAddingNew] = useState(false);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [errors, setErrors] = useState({});

      const emptyForm = { featureId: '', action: '', propertyMapping: '', conditionExpression: '' };
      const [newForm, setNewForm] = useState({ ...emptyForm });

      const featureOptions = useMemo(() => {
        return availableFeatures.map(f => ({
          ...f,
          value: f.id,
        }));
      }, [availableFeatures]);

      const propertyOptions = useMemo(() => {
        return availableProperties.map(e => ({
          ...e,
          value: e.propertyName,
        }));
      }, [availableProperties]);

      const renderFeatureOption = (o) => `${o.description}（${o.name}）`;
      const renderPropertyOption = (o) => `${o.propertyDesc}（${o.propertyName}）`;

      const validateForm = (form) => {
        const errs = {};
        if (!form.featureId) errs.featureId = '请选择特征';
        if (!form.action) errs.action = '请选择动作';
        if (!form.propertyMapping) errs.propertyMapping = '请选择提取属性';
        return errs;
      };

      const saveNew = () => {
        const errs = validateForm(newForm);
        if (Object.keys(errs).length > 0) { setErrors(errs); return; }
        const feature = availableFeatures.find(f => f.id === newForm.featureId);
        const newItem = {
          id: String(Date.now()),
          featureId: newForm.featureId,
          featureName: feature.name,
          featureDesc: feature.description,
          action: newForm.action,
          propertyMapping: newForm.propertyMapping,
          conditionExpression: newForm.conditionExpression || null,
        };
        setFeatures([...features, newItem]);
        setAddingNew(false);
        setNewForm({ ...emptyForm });
        setErrors({});
      };

      const handleDelete = (id) => {
        setFeatures(features.filter(f => f.id !== id));
        setDeleteConfirmId(null);
      };

      return (
        <div className="bg-white rounded-lg border border-slate-200 shadow-sm">
          {/* 卡片头 */}
          <div className="px-4 py-3 border-b border-[#f0f0f0] flex items-center gap-3">
            <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium whitespace-nowrap"
              style={{ color: sceneColor, background: `${sceneColor}15`, border: `1px solid ${sceneColor}30` }}>
              {sceneCode}
            </span>
            <span className="text-sm font-medium text-[rgba(0,0,0,0.88)]">{sceneName}</span>
            <span className="text-xs text-[rgba(0,0,0,0.45)]">({features.length} 个特征)</span>
          </div>

          {/* 已绑定特征表格 */}
          <table className="w-full" style={{ tableLayout: 'auto' }}>
            <thead>
              <tr className="bg-[#fafafa] border-b border-[#f0f0f0]">
                <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">特征信息</th>
                <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">动作</th>
                <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">提取属性</th>
                <th className="px-3 py-3 text-left text-xs font-medium text-[rgba(0,0,0,0.65)]">准入条件</th>
                <th className="px-3 py-3 text-center text-xs font-medium text-[rgba(0,0,0,0.65)] w-[100px]">操作</th>
              </tr>
            </thead>
            <tbody>
              {features.map(f => (
                <tr key={f.id} className="border-b border-[#f0f0f0] hover:bg-[#fafafa] transition-colors">
                  <td className="px-3 py-3">
                    <div className="text-sm text-[#1890ff] cursor-pointer hover:underline">{f.featureName}</div>
                    <div className="text-xs text-[rgba(0,0,0,0.45)] mt-0.5">{f.featureDesc}</div>
                  </td>
                  <td className="px-3 py-3">
                    <ActionTag action={f.action} />
                  </td>
                  <td className="px-3 py-3">
                    <code className="text-xs font-mono bg-[#f5f5f5] px-1.5 py-0.5 rounded text-[rgba(0,0,0,0.65)]">{f.propertyMapping}</code>
                  </td>
                  <td className="px-3 py-3">
                    {f.conditionExpression ? (
                      <code className="text-xs font-mono text-[#722ed1] bg-[#f9f0ff] px-1.5 py-0.5 rounded">{f.conditionExpression}</code>
                    ) : (
                      <span className="text-[rgba(0,0,0,0.25)]">-</span>
                    )}
                  </td>
                  <td className="px-3 py-3 text-center w-[100px]">
                    <div className="relative inline-flex items-center gap-2">
                      <button className="text-xs text-[#ff4d4f] hover:text-[#ff7875] transition-colors" onClick={() => setDeleteConfirmId(f.id)}>删除</button>
                      <ConfirmPopover
                        visible={deleteConfirmId === f.id}
                        onConfirm={() => handleDelete(f.id)}
                        onCancel={() => setDeleteConfirmId(null)}
                        message="确认删除该特征配置？"
                      />
                    </div>
                  </td>
                </tr>
              ))}
              {features.length === 0 && (
                <tr>
                  <td colSpan={5} className="px-3 py-8 text-center text-sm text-[rgba(0,0,0,0.25)]">暂无绑定特征，点击下方按钮添加</td>
                </tr>
              )}
            </tbody>
          </table>

          {/* 添加按钮 / 内联表单 */}
          {!addingNew && (
            <div className="px-4 py-3">
              <button
                className="w-full h-8 text-sm rounded-md border border-dashed border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.45)] hover:border-[#1890ff] hover:text-[#1890ff] transition-colors flex items-center justify-center gap-1"
                onClick={() => { setAddingNew(true); setNewForm({ ...emptyForm }); setErrors({}); }}
              >
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                添加特征配置
              </button>
            </div>
          )}

          <div className={`expand-section ${addingNew ? 'open' : ''}`}>
            <div className="expand-inner">
              {addingNew && (
                <div className="bg-[#fafafa] px-4 py-4" style={{ boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.04)' }}>
                  <div className="grid grid-cols-2 gap-x-4 gap-y-3">
                    <div>
                      <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">特征</label>
                      <SearchSelect
                        value={newForm.featureId}
                        onChange={(v) => { setNewForm({ ...newForm, featureId: v }); setErrors({ ...errors, featureId: undefined }); }}
                        options={featureOptions}
                        placeholder="选择特征"
                        renderOption={renderFeatureOption}
                      />
                      {errors.featureId && <div className="text-xs text-[#ff4d4f] mt-0.5">{errors.featureId}</div>}
                    </div>
                    <div>
                      <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">动作</label>
                      <SearchSelect
                        value={newForm.action}
                        onChange={(v) => { setNewForm({ ...newForm, action: v }); setErrors({ ...errors, action: undefined }); }}
                        options={ACTION_OPTIONS}
                        placeholder="选择动作"
                      />
                      {errors.action && <div className="text-xs text-[#ff4d4f] mt-0.5">{errors.action}</div>}
                    </div>
                    <div>
                      <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">提取属性</label>
                      <SearchSelect
                        value={newForm.propertyMapping}
                        onChange={(v) => { setNewForm({ ...newForm, propertyMapping: v }); setErrors({ ...errors, propertyMapping: undefined }); }}
                        options={propertyOptions}
                        placeholder="选择提取属性"
                        renderOption={renderPropertyOption}
                      />
                      {errors.propertyMapping && <div className="text-xs text-[#ff4d4f] mt-0.5">{errors.propertyMapping}</div>}
                    </div>
                    <div>
                      <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">准入条件</label>
                      <input
                        type="text"
                        className="w-full border rounded-md px-3 h-8 text-sm font-mono outline-none bg-white transition-colors border-[#d9d9d9] focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)]"
                        placeholder="如 fact.user_id != nil"
                        value={newForm.conditionExpression}
                        onChange={(e) => setNewForm({ ...newForm, conditionExpression: e.target.value })}
                      />
                    </div>
                  </div>
                  <div className="flex justify-end gap-2 mt-3">
                    <button className="h-8 px-4 text-sm rounded-md border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:border-[#1890ff] hover:text-[#1890ff] transition-colors"
                      onClick={() => { setAddingNew(false); setErrors({}); setNewForm({ ...emptyForm }); }}>取消</button>
                    <button className="h-8 px-4 text-sm rounded-md bg-[#1890ff] text-white border-none hover:bg-[#40a9ff] transition-colors"
                      onClick={saveNew}>保存</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     *  App 根组件
     * ================================================================ */
    function App() {
      const [activeEP, setActiveEP] = useState('EP00010001');
      const [activeTab, setActiveTab] = useState('extraction');

      // 提取配置 state
      const [extractions, setExtractions] = useState([...MOCK_EXTRACTIONS_LOGIN]);

      // 场景特征 state（按场景code分组）
      const [sceneFeatures, setSceneFeatures] = useState(() => {
        const result = {};
        Object.keys(MOCK_SCENE_FEATURES_LOGIN).forEach(k => {
          result[k] = [...MOCK_SCENE_FEATURES_LOGIN[k]];
        });
        return result;
      });

      // 当前EP的场景定义
      const currentScenes = activeEP === 'EP00010001' ? SCENES_LOGIN : SCENES_WITHDRAW;
      const currentPayload = activeEP === 'EP00010001' ? SAMPLE_PAYLOAD_LOGIN : SAMPLE_PAYLOAD_WITHDRAW;
      const epInfo = EP_LIST[activeEP];

      // 切EP时重置所有数据
      const switchEP = (ep) => {
        if (ep === activeEP) return;
        setActiveEP(ep);
        if (ep === 'EP00010001') {
          setExtractions([...MOCK_EXTRACTIONS_LOGIN]);
          const result = {};
          Object.keys(MOCK_SCENE_FEATURES_LOGIN).forEach(k => { result[k] = [...MOCK_SCENE_FEATURES_LOGIN[k]]; });
          setSceneFeatures(result);
        } else {
          setExtractions([...MOCK_EXTRACTIONS_WITHDRAW]);
          const result = {};
          Object.keys(MOCK_SCENE_FEATURES_WITHDRAW).forEach(k => { result[k] = [...MOCK_SCENE_FEATURES_WITHDRAW[k]]; });
          setSceneFeatures(result);
        }
      };

      // Tab 2 可用的属性列表（从 Tab 1 的启用提取规则中获取）
      const availableProperties = useMemo(() => {
        return extractions.filter(e => e.status === 1);
      }, [extractions]);

      // 更新某个场景的特征列表
      const setSceneFeaturesForCode = (code, newFeatures) => {
        setSceneFeatures(prev => ({ ...prev, [code]: newFeatures }));
      };

      const statusLabel = (status) => {
        const map = { running: { text: '运行中', color: '#52c41a', bg: '#f6ffed' }, stopped: { text: '已停用', color: 'rgba(0,0,0,0.45)', bg: '#f5f5f5' }, draft: { text: '未发布', color: '#faad14', bg: '#fffbe6' } };
        const s = map[status] || map.running;
        return (
          <span className="inline-flex items-center px-2 py-0.5 rounded text-xs whitespace-nowrap" style={{ color: s.color, background: s.bg, border: `1px solid ${s.color}30` }}>
            <span className="w-1.5 h-1.5 rounded-full mr-1.5" style={{ background: s.color }}></span>
            {s.text}
          </span>
        );
      };

      return (
        <div className="min-h-screen">
          <div className="max-w-[1600px] mx-auto p-6">
            {/* 面包屑 */}
            <div className="text-sm text-[rgba(0,0,0,0.45)] mb-4">
              <span className="hover:text-[#1890ff] cursor-pointer transition-colors">事件与策略编排</span>
              <span className="mx-2">/</span>
              <span className="hover:text-[#1890ff] cursor-pointer transition-colors">接入点管理</span>
              <span className="mx-2">/</span>
              <span className="text-[rgba(0,0,0,0.88)]">{epInfo.name}</span>
            </div>

            {/* EP 信息卡片 */}
            <div className="bg-white rounded-lg border border-slate-200 shadow-sm px-6 py-4 mb-4">
              <div className="flex items-center justify-between">
                <div>
                  <div className="flex items-center gap-3">
                    <h1 className="text-xl font-semibold text-[rgba(0,0,0,0.88)]">{epInfo.name}</h1>
                    {statusLabel(epInfo.status)}
                  </div>
                  <div className="flex items-center gap-4 mt-2">
                    <span className="text-xs text-[rgba(0,0,0,0.45)]">编码：<code className="font-mono text-[rgba(0,0,0,0.65)]">{epInfo.code}</code></span>
                    <span className="text-xs text-[rgba(0,0,0,0.45)]">{epInfo.description}</span>
                  </div>
                </div>
              </div>
            </div>

            {/* EP 切换 */}
            <div className="flex items-center gap-2 mb-4">
              {Object.values(EP_LIST).map(ep => (
                <button
                  key={ep.code}
                  className={`h-8 px-4 text-sm rounded-md transition-colors ${activeEP === ep.code ? 'bg-[#1890ff] text-white' : 'bg-white border border-[#d9d9d9] text-[rgba(0,0,0,0.65)] hover:border-[#1890ff] hover:text-[#1890ff]'}`}
                  onClick={() => switchEP(ep.code)}
                >
                  {ep.code} {ep.name}
                </button>
              ))}
            </div>

            {/* Tab 切换 */}
            <div className="flex items-center gap-0 mb-4 border-b border-[#f0f0f0]">
              <button
                className={`px-4 py-2.5 text-sm font-medium transition-colors relative ${activeTab === 'extraction' ? 'text-[#1890ff]' : 'text-[rgba(0,0,0,0.65)] hover:text-[#1890ff]'}`}
                onClick={() => setActiveTab('extraction')}
              >
                属性提取配置
                {activeTab === 'extraction' && <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-[#1890ff]"></div>}
              </button>
              <button
                className={`px-4 py-2.5 text-sm font-medium transition-colors relative ${activeTab === 'scene' ? 'text-[#1890ff]' : 'text-[rgba(0,0,0,0.65)] hover:text-[#1890ff]'}`}
                onClick={() => setActiveTab('scene')}
              >
                场景编排
                {activeTab === 'scene' && <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-[#1890ff]"></div>}
              </button>
            </div>

            {/* Tab 1: 属性提取配置（display:none 切换，保持 state） */}
            <div style={{ display: activeTab === 'extraction' ? 'block' : 'none' }}>
              <ExtractionCard
                extractions={extractions}
                setExtractions={setExtractions}
                payload={currentPayload}
                activeEP={activeEP}
              />
            </div>

            {/* Tab 2: 场景编排（display:none 切换，保持 state） */}
            <div style={{ display: activeTab === 'scene' ? 'block' : 'none' }}>
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-sm font-medium text-[rgba(0,0,0,0.88)]">场景编排</h3>
              </div>
              <div className="space-y-4">
                {currentScenes.map(scene => (
                  <SceneCard
                    key={`${activeEP}-${scene.code}`}
                    sceneName={scene.name}
                    sceneCode={scene.code}
                    sceneColor={scene.color}
                    features={sceneFeatures[scene.code] || []}
                    setFeatures={(newF) => setSceneFeaturesForCode(scene.code, newF)}
                    availableFeatures={MOCK_FEATURES}
                    availableProperties={availableProperties}
                  />
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
