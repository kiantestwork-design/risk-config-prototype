<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SceneCard 特征编排组件 Demo</title>
  <script src="./tailwind-cdn.js"></script>
  <script src="https://unpkg.com/react@19/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="./index.css" />
  <style>
    body { background: #f0f2f5; color: rgba(0,0,0,0.88); font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; }
    /* 展开收起动画 */
    .expand-section {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s ease;
    }
    .expand-section.open {
      grid-template-rows: 1fr;
    }
    .expand-inner {
      overflow: hidden;
    }
    /* 确认弹出层 */
    .confirm-popover {
      position: absolute;
      right: 0;
      top: 100%;
      z-index: 10;
      margin-top: 4px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08), 0 3px 6px -4px rgba(0,0,0,0.12), 0 9px 28px 8px rgba(0,0,0,0.05);
      padding: 12px 16px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ================================================================
     *  Mock 数据
     * ================================================================ */
    const MOCK_FEATURES = [
      { id: 'f1', name: 'user_login_device_history', description: '用户登录设备历史' },
      { id: 'f2', name: 'user_login_ip_history', description: '用户登录 IP 历史' },
      { id: 'f3', name: 'login_pre_snapshot', description: '登录前快照' },
      { id: 'f4', name: 'forter_login_result', description: 'Forter 登录结果缓存' },
      { id: 'f5', name: 'withdraw_history_user_24h', description: '用户24h提现历史' },
      { id: 'f6', name: 'user_login_count_1h', description: '用户1小时登录次数' },
    ];

    const MOCK_PROPERTIES = [
      { name: 'userId', description: '用户ID' },
      { name: 'deviceId', description: '设备ID' },
      { name: 'clientIp', description: '客户端IP' },
      { name: 'amount', description: '金额' },
      { name: 'loginTransactionId', description: '登录事务ID' },
    ];

    const ACTION_OPTIONS = [
      { value: 'READ', label: 'READ 读取', color: '#1890ff', bg: '#e6f7ff' },
      { value: 'WRITE', label: 'WRITE 写入', color: '#52c41a', bg: '#f6ffed' },
      { value: 'DELETE', label: 'DELETE 删除', color: '#ff4d4f', bg: '#fff1f0' },
    ];

    const INITIAL_FEATURES_PRE = [
      { id: '1', featureId: 'f3', featureName: 'login_pre_snapshot', featureDesc: '登录前快照', action: 'WRITE', propertyMapping: 'userId', conditionExpression: 'fact.userId != nil' },
      { id: '2', featureId: 'f1', featureName: 'user_login_device_history', featureDesc: '用户登录设备历史', action: 'WRITE', propertyMapping: 'deviceId', conditionExpression: 'fact.userId != nil && fact.deviceId != nil' },
      { id: '3', featureId: 'f2', featureName: 'user_login_ip_history', featureDesc: '用户登录 IP 历史', action: 'WRITE', propertyMapping: 'clientIp', conditionExpression: 'fact.userId != nil && fact.clientIp != nil' },
    ];

    const INITIAL_FEATURES_PROCESS = [
      { id: '4', featureId: 'f3', featureName: 'login_pre_snapshot', featureDesc: '登录前快照', action: 'READ', propertyMapping: 'userId', conditionExpression: null },
      { id: '5', featureId: 'f1', featureName: 'user_login_device_history', featureDesc: '用户登录设备历史', action: 'READ', propertyMapping: 'userId', conditionExpression: null },
      { id: '6', featureId: 'f4', featureName: 'forter_login_result', featureDesc: 'Forter 登录结果缓存', action: 'READ', propertyMapping: 'userId', conditionExpression: 'fact.needForterCheck == true' },
    ];

    const INITIAL_FEATURES_POST = [
      { id: '7', featureId: 'f3', featureName: 'login_pre_snapshot', featureDesc: '登录前快照', action: 'DELETE', propertyMapping: 'userId', conditionExpression: null },
      { id: '8', featureId: 'f4', featureName: 'forter_login_result', featureDesc: 'Forter 登录结果缓存', action: 'DELETE', propertyMapping: 'userId', conditionExpression: null },
      { id: '9', featureId: 'f1', featureName: 'user_login_device_history', featureDesc: '用户登录设备历史', action: 'WRITE', propertyMapping: 'deviceId', conditionExpression: 'fact.loginStatus == "SUCCESS"' },
    ];

    /* ================================================================
     *  ActionTag 标签组件
     * ================================================================ */
    function ActionTag({ action }) {
      const opt = ACTION_OPTIONS.find(o => o.value === action) || ACTION_OPTIONS[0];
      return (
        <span
          className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium whitespace-nowrap flex-shrink-0"
          style={{ color: opt.color, background: opt.bg, border: `1px solid ${opt.color}30` }}
        >
          {opt.value}
        </span>
      );
    }

    /* ================================================================
     *  SearchSelect 搜索下拉组件
     * ================================================================ */
    function SearchSelect({ value, onChange, options, placeholder, renderOption }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');
      const ref = useRef(null);

      useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const filtered = options.filter(o => {
        const label = renderOption ? renderOption(o) : o.label || o.name || '';
        return label.toLowerCase().includes(search.toLowerCase());
      });

      const selected = options.find(o => (o.value || o.id || o.name) === value);
      const displayText = selected
        ? (renderOption ? renderOption(selected) : selected.label || selected.name || '')
        : '';

      return (
        <div className="relative" ref={ref}>
          <div
            className="flex items-center border border-[#d9d9d9] rounded-md px-3 h-8 cursor-pointer bg-white hover:border-[#1890ff] transition-colors"
            onClick={() => setOpen(!open)}
          >
            <span className={`flex-1 text-sm truncate ${displayText ? 'text-[rgba(0,0,0,0.88)]' : 'text-[rgba(0,0,0,0.25)]'}`}>
              {displayText || placeholder}
            </span>
            <svg className="w-3 h-3 ml-1 text-[rgba(0,0,0,0.25)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
            </svg>
          </div>
          {open && (
            <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg shadow-lg border border-[#f0f0f0] z-20 py-1 max-h-60 overflow-auto">
              <div className="px-2 py-1.5">
                <input
                  type="text"
                  className="w-full border border-[#d9d9d9] rounded px-2 h-7 text-sm outline-none focus:border-[#1890ff]"
                  placeholder="搜索..."
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  autoFocus
                />
              </div>
              {filtered.length === 0 && (
                <div className="px-3 py-2 text-sm text-[rgba(0,0,0,0.25)]">无匹配项</div>
              )}
              {filtered.map(o => {
                const key = o.value || o.id || o.name;
                const label = renderOption ? renderOption(o) : o.label || o.name || '';
                const isSelected = key === value;
                return (
                  <div
                    key={key}
                    className={`px-3 py-1.5 text-sm cursor-pointer transition-colors ${isSelected ? 'bg-[#e6f7ff] text-[#1890ff]' : 'hover:bg-[#f5f5f5] text-[rgba(0,0,0,0.88)]'}`}
                    onClick={() => { onChange(key); setOpen(false); setSearch(''); }}
                  >
                    {label}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ================================================================
     *  ConfirmPopover 确认气泡组件
     * ================================================================ */
    function ConfirmPopover({ visible, onConfirm, onCancel, message }) {
      if (!visible) return null;
      return (
        <div className="confirm-popover">
          <div className="text-sm text-[rgba(0,0,0,0.88)] mb-2 flex items-center gap-1.5">
            <svg className="w-4 h-4 text-[#faad14] flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
            </svg>
            {message}
          </div>
          <div className="flex justify-end gap-2">
            <button
              className="h-6 px-2 text-xs rounded border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:border-[#1890ff] hover:text-[#1890ff] transition-colors"
              onClick={onCancel}
            >
              取消
            </button>
            <button
              className="h-6 px-2 text-xs rounded bg-[#ff4d4f] text-white border-none hover:bg-[#ff7875] transition-colors"
              onClick={onConfirm}
            >
              确认删除
            </button>
          </div>
        </div>
      );
    }

    /* ================================================================
     *  SceneCard 主组件
     * ================================================================ */
    function SceneCard({
      sceneName,
      sceneCode,
      sceneColor,
      initialFeatures = [],
      availableFeatures = MOCK_FEATURES,
      availableProperties = MOCK_PROPERTIES,
      onAddFeature,
      onRemoveFeature,
    }) {
      const [features, setFeatures] = useState(initialFeatures);
      const [isEditing, setIsEditing] = useState(false);
      const [confirmId, setConfirmId] = useState(null);
      const [formData, setFormData] = useState({
        featureId: '',
        action: '',
        propertyMapping: '',
        conditionExpression: '',
      });
      const [formErrors, setFormErrors] = useState({});

      const resetForm = () => {
        setFormData({ featureId: '', action: '', propertyMapping: '', conditionExpression: '' });
        setFormErrors({});
      };

      const handleCancel = () => {
        resetForm();
        setIsEditing(false);
      };

      const validate = () => {
        const errors = {};
        if (!formData.featureId) errors.featureId = '请选择特征';
        if (!formData.action) errors.action = '请选择动作';
        if (!formData.propertyMapping) errors.propertyMapping = '请选择提取属性';
        setFormErrors(errors);
        return Object.keys(errors).length === 0;
      };

      const handleSave = () => {
        if (!validate()) return;
        const feat = availableFeatures.find(f => f.id === formData.featureId);
        const newItem = {
          id: Date.now().toString(),
          featureId: formData.featureId,
          featureName: feat?.name || '',
          featureDesc: feat?.description || '',
          action: formData.action,
          propertyMapping: formData.propertyMapping,
          conditionExpression: formData.conditionExpression || null,
        };
        setFeatures(prev => [...prev, newItem]);
        onAddFeature?.(newItem);
        resetForm();
        setIsEditing(false);
      };

      const handleRemove = (id) => {
        setFeatures(prev => prev.filter(f => f.id !== id));
        onRemoveFeature?.(id);
        setConfirmId(null);
      };

      // 已绑定的特征 IDs（用于过滤下拉已绑定项）
      const boundFeatureActions = features.map(f => `${f.featureId}-${f.action}`);

      return (
        <div className="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
          {/* ---- 卡片头 ---- */}
          <div className="flex items-center gap-2 px-4 py-3 border-b border-[#f0f0f0]">
            <span
              className="inline-flex items-center px-2.5 py-0.5 rounded text-xs font-semibold"
              style={{ color: sceneColor, background: sceneColor + '15', border: `1px solid ${sceneColor}40` }}
            >
              {sceneCode}
            </span>
            <span className="text-sm font-medium text-[rgba(0,0,0,0.88)]">{sceneName}</span>
            <span className="text-xs text-[rgba(0,0,0,0.45)]">({features.length} 个特征)</span>
          </div>

          {/* ---- 区域一：已绑定特征列表 ---- */}
          <div className="px-4 py-2">
            {features.length === 0 ? (
              <div className="py-6 text-center text-sm text-[rgba(0,0,0,0.25)]">
                暂无绑定特征，点击下方按钮添加
              </div>
            ) : (
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-xs text-[rgba(0,0,0,0.45)] border-b border-[#f0f0f0]">
                    <th className="text-left py-2 px-2 font-normal">特征信息</th>
                    <th className="text-left py-2 px-2 font-normal w-[80px]">动作</th>
                    <th className="text-left py-2 px-2 font-normal w-[100px]">提取属性</th>
                    <th className="text-left py-2 px-2 font-normal">准入条件</th>
                    <th className="text-center py-2 px-2 font-normal w-[60px]">操作</th>
                  </tr>
                </thead>
                <tbody>
                  {features.map((f) => (
                    <tr key={f.id} className="border-b border-[#f0f0f0] last:border-b-0 hover:bg-[#fafafa] transition-colors">
                      <td className="py-2 px-2">
                        <div className="text-[#1890ff] text-sm cursor-pointer hover:text-[#40a9ff]">{f.featureName}</div>
                        <div className="text-xs text-[rgba(0,0,0,0.45)] mt-0.5">{f.featureDesc}</div>
                      </td>
                      <td className="py-2 px-2">
                        <ActionTag action={f.action} />
                      </td>
                      <td className="py-2 px-2">
                        <code className="text-xs bg-[#f5f5f5] px-1.5 py-0.5 rounded text-[rgba(0,0,0,0.65)]">{f.propertyMapping}</code>
                      </td>
                      <td className="py-2 px-2">
                        {f.conditionExpression ? (
                          <code className="text-xs text-[#722ed1] bg-[#f9f0ff] px-1.5 py-0.5 rounded">{f.conditionExpression}</code>
                        ) : (
                          <span className="text-[rgba(0,0,0,0.25)]">-</span>
                        )}
                      </td>
                      <td className="py-2 px-2 text-center relative">
                        <button
                          className="text-xs text-[rgba(0,0,0,0.45)] hover:text-[#ff4d4f] transition-colors"
                          onClick={() => setConfirmId(confirmId === f.id ? null : f.id)}
                        >
                          删除
                        </button>
                        <ConfirmPopover
                          visible={confirmId === f.id}
                          message="确认解绑该特征？"
                          onConfirm={() => handleRemove(f.id)}
                          onCancel={() => setConfirmId(null)}
                        />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          {/* ---- 区域二：添加按钮 ---- */}
          {!isEditing && (
            <div className="px-4 pb-3">
              <button
                className="w-full h-9 border border-dashed border-[#d9d9d9] rounded-md text-sm text-[rgba(0,0,0,0.45)] hover:text-[#1890ff] hover:border-[#1890ff] transition-all flex items-center justify-center gap-1"
                onClick={() => setIsEditing(true)}
              >
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                </svg>
                添加特征配置
              </button>
            </div>
          )}

          {/* ---- 区域三：内联编辑区（展开动画） ---- */}
          <div className={`expand-section ${isEditing ? 'open' : ''}`}>
            <div className="expand-inner">
              <div className="bg-[#fafafa] border-t border-[#f0f0f0] px-4 py-4" style={{ boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.04)' }}>
                <div className="grid grid-cols-2 gap-x-4 gap-y-3">
                  {/* 特征选择 */}
                  <div>
                    <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">
                      特征 <span className="text-[#ff4d4f]">*</span>
                    </label>
                    <SearchSelect
                      value={formData.featureId}
                      onChange={(v) => { setFormData(prev => ({ ...prev, featureId: v })); setFormErrors(prev => ({ ...prev, featureId: undefined })); }}
                      options={availableFeatures}
                      placeholder="搜索并选择特征"
                      renderOption={(o) => `${o.description}（${o.name}）`}
                    />
                    {formErrors.featureId && <span className="text-xs text-[#ff4d4f] mt-0.5 block">{formErrors.featureId}</span>}
                  </div>

                  {/* 动作选择 */}
                  <div>
                    <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">
                      动作 <span className="text-[#ff4d4f]">*</span>
                    </label>
                    <SearchSelect
                      value={formData.action}
                      onChange={(v) => { setFormData(prev => ({ ...prev, action: v })); setFormErrors(prev => ({ ...prev, action: undefined })); }}
                      options={ACTION_OPTIONS.map(o => ({ ...o, id: o.value }))}
                      placeholder="选择动作"
                      renderOption={(o) => o.label}
                    />
                    {formErrors.action && <span className="text-xs text-[#ff4d4f] mt-0.5 block">{formErrors.action}</span>}
                  </div>

                  {/* 提取属性 */}
                  <div>
                    <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">
                      提取属性 <span className="text-[#ff4d4f]">*</span>
                    </label>
                    <SearchSelect
                      value={formData.propertyMapping}
                      onChange={(v) => { setFormData(prev => ({ ...prev, propertyMapping: v })); setFormErrors(prev => ({ ...prev, propertyMapping: undefined })); }}
                      options={availableProperties}
                      placeholder="选择提取属性"
                      renderOption={(o) => `${o.description}（${o.name}）`}
                    />
                    {formErrors.propertyMapping && <span className="text-xs text-[#ff4d4f] mt-0.5 block">{formErrors.propertyMapping}</span>}
                  </div>

                  {/* 准入条件 */}
                  <div>
                    <label className="block text-xs text-[rgba(0,0,0,0.65)] mb-1">准入条件（选填）</label>
                    <input
                      type="text"
                      className="w-full h-8 border border-[#d9d9d9] rounded-md px-3 text-sm outline-none focus:border-[#1890ff] focus:shadow-[0_0_0_2px_rgba(24,144,255,0.2)] transition-all bg-white placeholder:text-[rgba(0,0,0,0.25)]"
                      placeholder="如：fact.amount > 1000"
                      value={formData.conditionExpression}
                      onChange={(e) => setFormData(prev => ({ ...prev, conditionExpression: e.target.value }))}
                    />
                  </div>
                </div>

                {/* 操作按钮 */}
                <div className="flex justify-end gap-2 mt-4 pt-3 border-t border-[#f0f0f0]">
                  <button
                    className="h-8 px-4 text-sm rounded-md border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:text-[#1890ff] hover:border-[#1890ff] transition-colors"
                    onClick={handleCancel}
                  >
                    取消
                  </button>
                  <button
                    className="h-8 px-4 text-sm rounded-md bg-[#1890ff] text-white border-none hover:bg-[#40a9ff] transition-colors"
                    onClick={handleSave}
                  >
                    保存
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================
     *  Demo 页面
     * ================================================================ */
    function App() {
      return (
        <div className="max-w-[1200px] mx-auto py-8 px-6">
          {/* 面包屑 */}
          <div className="flex items-center gap-1.5 text-sm text-[rgba(0,0,0,0.45)] mb-4">
            <span className="hover:text-[#1890ff] cursor-pointer">数据配置</span>
            <span>/</span>
            <span className="hover:text-[#1890ff] cursor-pointer">接入点管理</span>
            <span>/</span>
            <span className="text-[rgba(0,0,0,0.88)]">EP00010001 登录风控</span>
          </div>

          {/* 接入点标题区 */}
          <div className="bg-white rounded-lg border border-slate-200 shadow-sm p-5 mb-6">
            <div className="flex items-start justify-between">
              <div>
                <div className="flex items-center gap-3 mb-1">
                  <h1 className="text-lg font-semibold text-[rgba(0,0,0,0.88)]">EP00010001 登录风控</h1>
                  <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-[#f6ffed] text-[#52c41a] border border-[#b7eb8f]">
                    运行中
                  </span>
                </div>
                <p className="text-sm text-[rgba(0,0,0,0.45)]">登录流程全链路风控接入点，包含三阶段场景：事前采集、事中决策、事后更新</p>
              </div>
              <button className="h-8 px-4 text-sm rounded-md border border-[#d9d9d9] bg-white text-[rgba(0,0,0,0.65)] hover:text-[#1890ff] hover:border-[#1890ff] transition-colors">
                编辑接入点
              </button>
            </div>
          </div>

          {/* 场景列表标题 */}
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-base font-medium text-[rgba(0,0,0,0.88)]">场景编排</h2>
            <button className="h-8 px-4 text-sm rounded-md bg-[#1890ff] text-white border-none hover:bg-[#40a9ff] transition-colors flex items-center gap-1">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
              </svg>
              新增场景
            </button>
          </div>

          {/* 三张 SceneCard */}
          <div className="space-y-4">
            <SceneCard
              sceneName="登录-事前"
              sceneCode="PRE"
              sceneColor="#1890ff"
              initialFeatures={INITIAL_FEATURES_PRE}
              onAddFeature={(f) => console.log('PRE add:', f)}
              onRemoveFeature={(id) => console.log('PRE remove:', id)}
            />
            <SceneCard
              sceneName="登录-事中"
              sceneCode="PROCESS"
              sceneColor="#faad14"
              initialFeatures={INITIAL_FEATURES_PROCESS}
              onAddFeature={(f) => console.log('PROCESS add:', f)}
              onRemoveFeature={(id) => console.log('PROCESS remove:', id)}
            />
            <SceneCard
              sceneName="登录-事后"
              sceneCode="POST"
              sceneColor="#ff4d4f"
              initialFeatures={INITIAL_FEATURES_POST}
              onAddFeature={(f) => console.log('POST add:', f)}
              onRemoveFeature={(id) => console.log('POST remove:', id)}
            />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
